<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📦 庫存管理 (同步至 Google Sheets)</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f0f2f5; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0; 
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: white; 
            border-radius: 12px; 
            padding: 25px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            overflow: hidden;
        }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .status-bar { font-size: 12px; color: #666; margin-bottom: 15px; text-align: right; }
        .input-group { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            width: 100%;
        }
        input { 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
            min-width: 0; 
            width: 100%;
            flex: 2; 
            outline: none; 
            transition: border-color 0.2s;
        }
        input:focus { border-color: #0078d4; }
        input[type="number"] { flex: 1; }
        button { 
            background: #0078d4; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            transition: 0.2s; 
        }
        button:active { transform: scale(0.98); background: #005a9e; }
        button:disabled { background: #999; cursor: not-allowed; }
        .sync-status { 
            margin-top: 15px; 
            font-size: 14px; 
            text-align: center; 
            height: 20px; 
            font-weight: bold; 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th, td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #eee; 
            word-wrap: break-word;
        }
        th { background: #f8f9fa; color: #555; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .loading { color: #0078d4; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 庫存同步系統</h2>
        <div class="status-bar" id="lastSync">尚未同步</div>
        
        <div class="input-group">
            <input type="text" id="itemName" placeholder="物品名稱 (例如：pcb)">
            <input type="number" id="itemQty" placeholder="數量(沒填=1)" min="1">
        </div>
        <button id="submitBtn" onclick="handleAddItem()">新增並同步</button>
        <div id="syncMsg" class="sync-status"></div>

        <table id="localList">
            <thead>
                <tr>
                    <th width="70%">最新新增項目</th>
                    <th width="30%">數量</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // 這裡已經保留了你原本的 API 網址
        const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbxW04FsZJILpoAOSRo-LqXM4UL1uWwd8o6ydwBEaTJLFovbQUf6n9iBAMZIzj3tYAkL/exec";

        let inventory = JSON.parse(localStorage.getItem('cloudInv')) || [];
        renderList();

        document.getElementById('itemName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleAddItem();
        });
        document.getElementById('itemQty').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleAddItem();
        });

        async function handleAddItem() {
            const nameInput = document.getElementById('itemName');
            const qtyInput = document.getElementById('itemQty');
            const btn = document.getElementById('submitBtn');
            const msgDiv = document.getElementById('syncMsg');
            
            const name = nameInput.value.trim();
            // 💡 智慧判斷：如果框框是空的，就自動把數量當成 1
            const qty = qtyInput.value === '' ? 1 : parseInt(qtyInput.value);

            if (!name || isNaN(qty) || qty <= 0) {
                alert("請輸入正確的物品名稱與數量！");
                nameInput.focus();
                return;
            }

            // 1. 本地端先更新畫面
            inventory.push({ name, qty });
            localStorage.setItem('cloudInv', JSON.stringify(inventory));
            renderList();
            
            // 🚀 【重點修改】一按下按鈕，立刻把兩個輸入框清空成「完全空白」！
            // 讓你不用等雲端轉圈圈，就能馬上準備輸入下一個零件。
            nameInput.value = "";
            qtyInput.value = "";
            nameInput.focus();
            
            // 2. 準備雲端同步
            msgDiv.innerText = "⏳ 正在傳送資料至 Google Sheets...";
            msgDiv.className = "sync-status loading";
            btn.disabled = true;

            try {
                await fetch(CLOUD_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ name: name, qty: qty })
                });

                msgDiv.innerText = "✅ 同步成功！";
                msgDiv.className = "sync-status success";
                document.getElementById('lastSync').innerText = "最後同步: " + new Date().toLocaleTimeString();
                
            } catch (err) {
                msgDiv.innerText = "❌ 同步失敗 (請檢查網路連線)";
                msgDiv.className = "sync-status error";
                console.error("錯誤:", err);
            } finally {
                btn.disabled = false;
            }
        }

        function renderList() {
            const tbody = document.querySelector('#localList tbody');
            if (inventory.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#aaa; padding: 20px;">目前沒有資料</td></tr>';
                return;
            }
            tbody.innerHTML = inventory.slice(-5).reverse().map(item => `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.qty}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
