<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📦 兆豐電子料件雲端庫存系統</title>
    
    <link rel="icon" type="image/x-icon" href="Logo_new.ico" />

    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 600px; background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* 3. 新增 Logo 樣式 */
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }
        /* 控制 Logo 圖片的大小，如果覺得太大或太小可以改這裡的 height */
        .header-logo { height: 45px; width: auto; border-radius: 4px; }
        h2 { margin: 0; font-size: 22px; color: #333; letter-spacing: 1px; }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; min-width: 0; width: 100%; flex: 2; outline: none; }
        input[type="number"] { flex: 1; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        button { border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn-primary { background: #0078d4; color: white; flex: 2; }
        .btn-search { background: #f3f2f1; color: #333; flex: 1; border: 1px solid #ccc; }
        .sync-status { margin: 10px 0; font-size: 14px; text-align: center; font-weight: bold; }
        #selectorBox { display: none; background: #fff9db; border: 2px solid #fab005; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        #selectorTitle { font-weight: bold; color: #e67e22; }
        .select-item { background: white; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 8px; cursor: pointer; }
        .select-item:hover { border-color: #0078d4; background: #f0f7ff; }
        .error { color: #dc3545; }
        .success { color: #28a745; }
        .warning { color: #e67e22; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <img src="Logo_Big.JPG" alt="ZHAO FENG Logo" class="header-logo">
            <h2>兆豐電子料件雲端庫存</h2>
        </div>

        <div class="input-group">
            <input type="text" id="itemName" placeholder="代碼/品號/品名">
            <input type="number" id="itemQty" value="1">
        </div>
        <div class="btn-group">
            <button class="btn-search" onclick="handleAction('search')">🔍 查詢庫存</button>
            <button class="btn-primary" onclick="handleAction('update')">✍️ 寫入入庫</button>
        </div>
        <div id="status" class="sync-status"></div>
        
        <div id="selectorBox">
            <div id="selectorTitle">請選擇項目：</div>
            <div id="selectList"></div>
        </div>

        <table style="width:100%; margin-top:20px; border-collapse: collapse;">
            <thead style="background:#f8f9fa"><tr><th style="padding:10px; text-align:left">最近寫入項目</th></tr></thead>
            <tbody id="history"></tbody>
        </table>
    </div>

    <script>
        // 已經幫你放入正確的 API 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbxW04FsZJILpoAOSRo-LqXM4UL1uWwd8o6ydwBEaTJLFovbQUf6n9iBAMZIzj3tYAkL/exec"; 

        async function handleAction(action, targetRow = null) {
            const nameInput = document.getElementById('itemName');
            const name = nameInput.value.trim();
            const qty = document.getElementById('itemQty').value;
            const status = document.getElementById('status');
            const selector = document.getElementById('selectorBox');
            
            if (!name) return alert("請輸入要查詢或寫入的物品名稱！");
            
            status.innerText = "⏳ 處理中...";
            status.className = "sync-status";
            selector.style.display = "none";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, name, keyword: name, qty, targetRow })
                });
                const res = await response.json();

                if (res.status === "duplicate") {
                    status.innerText = "⚠️ 偵測到多筆相符項目，請從下方選擇正確寫入目標：";
                    status.className = "sync-status warning";
                    showSelector(res.data, action);
                } else if (res.status === "success") {
                    if (action === 'search') {
                        if (res.data.length === 0) {
                            status.innerText = "❌ 查無此品號或代碼";
                            status.className = "sync-status error";
                        } else {
                            status.innerText = `✅ 找到 ${res.data.length} 筆資料：`;
                            status.className = "sync-status success";
                            showSelector(res.data, 'search');
                        }
                    } else {
                        status.innerText = "✅ 寫入成功！";
                        status.className = "sync-status success";
                        addHistory(name, qty);
                        nameInput.value = "";
                        nameInput.focus();
                    }
                } else {
                    status.innerText = "❌ " + (res.message || "發生錯誤");
                    status.className = "sync-status error";
                }
            } catch (e) { 
                status.innerText = "❌ 連線失敗，請檢查網路及 API 設定"; 
                status.className = "sync-status error";
            }
        }

        function showSelector(data, action) {
            const list = document.getElementById('selectList');
            const box = document.getElementById('selectorBox');
            const title = document.getElementById('selectorTitle');
            
            title.innerText = (action === 'search') ? "🔍 查詢結果清單：" : "⚠️ 偵測到重複品項，請點擊要寫入的項目：";
            
            list.innerHTML = data.map(item => `
                <div class="select-item" onclick="${action === 'update' ? `handleAction('update', ${item.row})` : ''}">
                    <div style="font-weight:bold; color:#0078d4">代碼: ${item.code} | ${item.partNo}</div>
                    <div style="font-size:13px; color:#666;">${item.partName}</div>
                    <div style="color:#e91e63">目前庫存/餘料: ${item.stock}</div>
                    ${action === 'update' ? `<div style="font-size:12px; color:#aaa; text-align:right; margin-top:5px;">[ 點擊寫入此項 ]</div>` : ''}
                </div>
            `).join('');
            box.style.display = "block";
        }

        function addHistory(n, q) {
            const h = document.getElementById('history');
            const row = h.insertRow(0);
            row.innerHTML = `<td style="padding:10px; border-bottom:1px solid #eee">${n} (寫入數量: ${q})</td>`;
        }
    </script>
</body>
</html>
